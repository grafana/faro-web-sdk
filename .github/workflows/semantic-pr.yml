name: 'Validate Semantic Pull Request'

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - id: lint-pr-title
        uses: grafana/shared-workflows/actions/lint-pr-title@8acf96c0b34009637760fbe3eeaad9c2b6b99bb8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
