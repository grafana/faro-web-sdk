name: 'Validate Semantic Pull Request'

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - id: lint-pr-title
        uses: grafana/shared-workflows/actions/lint-pr-title@e6dde86ffefaa91fc693b8cb4209cf9428a661d1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
