name: 'Validate Semantic Pull Request'

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - id: lint-pr-title
        uses: grafana/shared-workflows/actions/lint-pr-title@c2f1df59dba624b3fd509e5181aa8da5217120c0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
