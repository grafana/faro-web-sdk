name: 'Validate Semantic Pull Request'

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - id: lint-pr-title
        uses: grafana/shared-workflows/actions/lint-pr-title@beb09ff2ba74e03329e99bc850246576a1c6cedb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
