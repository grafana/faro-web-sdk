name: 'Validate Semantic Pull Request'

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions: {}

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - id: lint-pr-title
        uses: grafana/shared-workflows/actions/lint-pr-title@0a6d0382a92b7282ab72bb4a934225d8cb17a8ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
