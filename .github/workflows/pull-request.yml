name: Pull Request

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    permissions:
      contents: read
    name: Testing with Node version (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.x, 24.x, latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Auto-fix lint issues
        run: yarn quality:lint:fix

      - name: Check for unfixed lint issues
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::The files above have auto-fixable lint issues that were not committed."
            echo "::error::Run 'yarn quality:lint:fix' locally and commit the changes."
            exit 1
          fi

      - name: Build
        run: yarn build

      - name: Lint
        run: yarn quality:lint

      - name: Check circular dependencies
        run: yarn quality:circular-deps

      - name: Unit tests
        run: yarn quality:test

  e2e-smoke:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:26.0.0@sha256:87a2e90f7d8c6531e6d834ad6354b9d59cf6eabe72022bd68a53c52ed5a247e0
      options: --user 1001

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Enable Corepack
        run: |
          mkdir -p "$HOME/.local"
          npm install -g --prefix "$HOME/.local" corepack
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/corepack" enable --install-directory "$HOME/.local/bin"

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Smoke E2E tests
        uses: cypress-io/github-action@be9c221b90b2fb97daedfa8699d1f08b662efc70
        with:
          command: yarn workspace @grafana/faro-smoke-harness run e2e:ci
          install: false
