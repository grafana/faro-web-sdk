name: Pull Request

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    permissions:
      contents: read
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Scans first-party source folders (packages, demo, experimental,
      # cypress, docs, infra, ai, dashboards) to avoid noisy false positives
      # from node_modules and .yarn/cache. TruffleHog flags minified webpack
      # chunks as unverified Sentry DSN-style tokens; we do not ship Sentry
      # auth tokens, so SentryToken is excluded. Runs as its own job (rather
      # than once per Node matrix entry) and gates downstream jobs so they
      # fail fast on a finding without triplicating the scan.
      - name: Run secret scan
        uses: ./.github/actions/secret-scan

  test:
    needs: secret-scan
    permissions:
      contents: read
    name: Testing with Node version (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.x, 24.x, latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Auto-fix lint issues
        run: yarn quality:lint:fix

      - name: Check for unfixed lint issues
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::The files above have auto-fixable lint issues that were not committed."
            echo "::error::Run 'yarn quality:lint:fix' locally and commit the changes."
            exit 1
          fi

      - name: Build
        run: yarn build

      - name: Lint
        run: yarn quality:lint

      - name: Check circular dependencies
        run: yarn quality:circular-deps

      - name: Unit tests
        run: yarn quality:test

  e2e:
    needs: secret-scan
    permissions:
      contents: read

    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:26.0.0@sha256:87a2e90f7d8c6531e6d834ad6354b9d59cf6eabe72022bd68a53c52ed5a247e0
      options: --user 1001

    services:
      database:
        image: postgres:18.1@sha256:5773fe724c49c42a7a9ca70202e11e1dff21fb7235b335a73f39297d200b73a2
        env:
          POSTGRES_DB: demo
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # cypress/browsers:>=26 is based on Node.js 26 which no longer bundles
      # Yarn v1 Classic, and the image does not ship the `corepack` binary on
      # PATH either. Install Corepack from npm into a user-writable prefix
      # (the container runs as `--user 1001`, which cannot write to
      # /usr/local/bin) and enable it so the yarn shim — resolved via the
      # `packageManager` field in package.json — is available for both
      # setup-node's cache lookup and the subsequent yarn install/build steps.
      - name: Enable Corepack
        run: |
          mkdir -p "$HOME/.local"
          npm install -g --prefix "$HOME/.local" corepack
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/corepack" enable --install-directory "$HOME/.local/bin"

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: E2E tests
        uses: cypress-io/github-action@be9c221b90b2fb97daedfa8699d1f08b662efc70
        env:
          DATABASE_HOST: database
          DATABASE_PORT: 5432
          DATABASE_NAME: demo
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          IS_TEST: 1
        with:
          command: yarn quality:e2e:ci
          install: false
