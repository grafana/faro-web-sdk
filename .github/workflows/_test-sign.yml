# TEMPORARY — delete before merging PR #2150.
#
# Isolated dry-run for the signed-commit mechanic used by release-please.yml's
# "Commit and push release fixes" step. It exercises ONLY createCommitOnBranch
# (via actions/github-script + the App token) against a throwaway scratch branch,
# decoupled from the release-please gating that never fires on workflow_dispatch.
#
# Usage:
#   1. Push this branch so the workflow is dispatchable.
#   2. Create the scratch branch from an existing (already-verified) commit so the
#      "verified signatures" ruleset doesn't reject its creation:
#        gh api repos/grafana/faro-web-sdk/git/refs \
#          -f ref=refs/heads/test/sign-dryrun \
#          -f sha="$(gh api repos/grafana/faro-web-sdk/commits/main --jq .sha)"
#   3. Run it:
#        gh workflow run _test-sign.yml --ref <this-branch> -f branch=test/sign-dryrun
#   4. Confirm the commit is signed/verified:
#        gh api repos/grafana/faro-web-sdk/commits/test/sign-dryrun --jq '.commit.verification'
#      Expect: {"verified": true, "reason": "valid", ...}
#   5. Clean up:
#        gh api -X DELETE repos/grafana/faro-web-sdk/git/refs/heads/test/sign-dryrun
#      and delete this file.

name: '[temp] test signed commit'

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Scratch branch to commit onto (must already exist)'
        required: true
        default: 'test/sign-dryrun'

permissions:
  contents: read

jobs:
  test-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # needed to mint the GitHub App token via OIDC

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Mint GitHub App token
        id: app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b
        with:
          github_app: app-o11y-kwl-ci

      - name: Checkout scratch branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.branch }}
          persist-credentials: false

      - name: Produce a tracked modification
        run: |
          set -euo pipefail
          # Modify a tracked file so the tracked-only diff has something to commit.
          printf '\n<!-- sign dry-run %s -->\n' "$(date -u +%FT%TZ)" >> README.md

      - name: Create signed commit (mirror of release-please.yml)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          MESSAGE: 'chore: sign dry-run (delete me)'
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { execSync } = require('node:child_process');
            const fs = require('node:fs');

            const expectedHeadOid = execSync('git rev-parse HEAD').toString().trim();

            const entries = execSync('git diff -z --no-renames --name-status')
              .toString()
              .split('\0')
              .filter(Boolean);

            const additions = [];
            const deletions = [];
            for (let i = 0; i < entries.length; i += 2) {
              const status = entries[i];
              const path = entries[i + 1];
              if (status === 'D') {
                deletions.push({ path });
                continue;
              }
              if (!fs.lstatSync(path).isFile()) {
                core.warning(`Skipping non-regular file: ${path}`);
                continue;
              }
              additions.push({ path, contents: fs.readFileSync(path).toString('base64') });
            }

            const mutation = `
              mutation($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) { commit { oid } }
              }`;

            const result = await github.graphql(mutation, {
              input: {
                branch: {
                  repositoryNameWithOwner: process.env.GITHUB_REPOSITORY,
                  branchName: process.env.BRANCH,
                },
                message: { headline: process.env.MESSAGE },
                expectedHeadOid,
                fileChanges: { additions, deletions },
              },
            });

            const oid = result.createCommitOnBranch.commit.oid;
            const repo = process.env.GITHUB_REPOSITORY;
            core.info(`Created signed commit ${oid}`);
            await core.summary
              .addRaw(`Created signed commit \`${oid}\` on \`${process.env.BRANCH}\`. `)
              .addRaw(`Verify: \`gh api repos/${repo}/commits/${oid} --jq '.commit.verification'\``)
              .write();
